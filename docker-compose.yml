version: "3.9"

services:
  scheduler:
    image: daskdev/dask:latest
    command: dask scheduler
    ports:
      - "8786:8786"
      - "8787:8787"

  worker-1:
    image: daskdev/dask:latest
    command: dask worker tcp://scheduler:8786 --nthreads 2 --memory-limit 4GB
    depends_on:
      - scheduler

  worker-2:
    image: daskdev/dask:latest
    command: dask worker tcp://scheduler:8786 --nthreads 2 --memory-limit 4GB
    depends_on:
      - scheduler

  jupyter:
    build: .
    volumes:
      - ./:/workspace
    ports:
      - "8888:8888"
    depends_on:
      - scheduler
